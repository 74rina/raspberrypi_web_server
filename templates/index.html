<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Raspberry Pi Reminder System</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <main class="container">
      <header class="page-header">
        <p class="eyebrow">Raspberry Pi Reminder</p>
        <h1>リマインねこ</h1>
      </header>

      <section class="status-panel">
        <div>
          <p class="label">現在の状態</p>
          <p id="statusText" class="status waiting">WAITING</p>
        </div>

        <p id="statusDetail">リマインダーを読み込んでいます。</p>
      </section>

      <section class="form-panel">
        <h2>新しいリマインダー</h2>

        <form id="reminderForm">
          <div class="form-grid">
            <label>
              <span>やること</span>
              <input
                id="todoInput"
                name="todo"
                type="text"
                maxlength="120"
                autocomplete="off"
                required
              />
            </label>

            <label>
              <span>知らせる日時</span>
              <input
                id="remindAtInput"
                name="remind_at"
                type="datetime-local"
                step="1"
                required
              />
            </label>
          </div>

          <div class="button-group">
            <button type="submit" class="primary-button">登録</button>

            <button id="testLedButton" type="button" class="secondary-button">
              LEDテスト
            </button>
          </div>
        </form>

        <p id="formMessage" class="message"></p>
      </section>

      <section class="list-panel">
        <div class="section-heading">
          <h2>リマインダー一覧</h2>
          <span>自動更新</span>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>通知日時</th>
                <th>やること</th>
                <th>状態</th>
                <th>作成日時</th>
                <th>操作</th>
              </tr>
            </thead>

            <tbody id="remindersBody">
              <tr>
                <td colspan="5">リマインダーを読み込んでいます。</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const statusText = document.getElementById("statusText");
      const statusDetail = document.getElementById("statusDetail");
      const reminderForm = document.getElementById("reminderForm");
      const todoInput = document.getElementById("todoInput");
      const remindAtInput = document.getElementById("remindAtInput");
      const formMessage = document.getElementById("formMessage");
      const remindersBody = document.getElementById("remindersBody");
      const testLedButton = document.getElementById("testLedButton");

      function toDatetimeLocalValue(date) {
        const offsetMs = date.getTimezoneOffset() * 60 * 1000;
        const localDate = new Date(date.getTime() - offsetMs);

        return localDate.toISOString().slice(0, 19);
      }

      function setDefaultDatetime() {
        const defaultDate = new Date(Date.now() + 60 * 1000);
        const minDate = new Date(Date.now() - 60 * 1000);

        remindAtInput.value = toDatetimeLocalValue(defaultDate);
        remindAtInput.min = toDatetimeLocalValue(minDate);
      }

      function createCell(value) {
        const cell = document.createElement("td");
        cell.textContent = value;
        return cell;
      }

      function createActionButton(text, className, onClick) {
        const button = document.createElement("button");

        button.type = "button";
        button.className = className;
        button.textContent = text;
        button.addEventListener("click", onClick);

        return button;
      }

      function updateStatus(reminders) {
        const pendingReminder = reminders.find(
          (reminder) => reminder.status === "pending",
        );
        const notifiedReminder = reminders.find(
          (reminder) => reminder.status === "notified",
        );

        if (pendingReminder) {
          statusText.textContent = "WAITING";
          statusText.className = "status waiting";
          statusDetail.textContent = `${pendingReminder.remind_at_display} / ${pendingReminder.todo}`;
          return;
        }

        if (notifiedReminder) {
          statusText.textContent = "NOTIFIED";
          statusText.className = "status notified";
          statusDetail.textContent = `${notifiedReminder.todo} の時間です。`;
          return;
        }

        statusText.textContent = "NO DATA";
        statusText.className = "status";
        statusDetail.textContent = "待機中のリマインダーはありません。";
      }

      async function updateReminderStatus(id, action) {
        const response = await fetch(`/api/reminders/${id}/${action}`, {
          method: "POST",
          cache: "no-store",
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "更新に失敗しました。");
        }

        formMessage.textContent = result.message;
        await refreshReminders();
      }

      function renderReminders(reminders) {
        remindersBody.replaceChildren();

        if (reminders.length === 0) {
          const row = document.createElement("tr");
          const cell = createCell("まだリマインダーがありません。");

          cell.colSpan = 5;
          row.appendChild(cell);
          remindersBody.appendChild(row);
          return;
        }

        for (const reminder of reminders) {
          const row = document.createElement("tr");

          row.classList.add(`status-${reminder.status}`);
          row.appendChild(createCell(reminder.remind_at_display));
          row.appendChild(createCell(reminder.todo));
          row.appendChild(createCell(reminder.status_label));
          row.appendChild(createCell(reminder.created_at_display));

          const actionCell = document.createElement("td");
          const actions = document.createElement("div");

          actions.className = "row-actions";

          if (reminder.status === "pending" || reminder.status === "notified") {
            actions.appendChild(
              createActionButton("完了", "small-button complete-button", () =>
                updateReminderStatus(reminder.id, "complete"),
              ),
            );
          }

          if (reminder.status === "pending") {
            actions.appendChild(
              createActionButton("取消", "small-button cancel-button", () =>
                updateReminderStatus(reminder.id, "cancel"),
              ),
            );
          }

          if (actions.childElementCount === 0) {
            actionCell.textContent = "-";
          } else {
            actionCell.appendChild(actions);
          }

          row.appendChild(actionCell);
          remindersBody.appendChild(row);
        }
      }

      async function refreshReminders() {
        try {
          const response = await fetch("/api/reminders", { cache: "no-store" });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const reminders = await response.json();

          renderReminders(reminders);
          updateStatus(reminders);
        } catch (error) {
          statusText.textContent = "ERROR";
          statusText.className = "status error";
          statusDetail.textContent = `リマインダーを取得できませんでした: ${error}`;
        }
      }

      reminderForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const submitButton = reminderForm.querySelector(
          "button[type='submit']",
        );
        const payload = {
          todo: todoInput.value,
          remind_at: remindAtInput.value,
        };

        submitButton.disabled = true;
        formMessage.textContent = "登録しています。";

        try {
          const response = await fetch("/api/reminders", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });
          const result = await response.json();

          if (!response.ok) {
            throw new Error(result.error || "登録に失敗しました。");
          }

          todoInput.value = "";
          setDefaultDatetime();
          formMessage.textContent = result.message;
          await refreshReminders();
        } catch (error) {
          formMessage.textContent = `${error}`;
        } finally {
          submitButton.disabled = false;
        }
      });

      testLedButton.addEventListener("click", async () => {
        testLedButton.disabled = true;
        formMessage.textContent = "LEDテストを実行しています。";

        try {
          const response = await fetch("/api/test-led", {
            method: "POST",
            cache: "no-store",
          });
          const result = await response.json();

          if (!response.ok) {
            throw new Error(result.error || "LEDテストに失敗しました。");
          }

          formMessage.textContent = result.message;
        } catch (error) {
          formMessage.textContent = `${error}`;
        } finally {
          testLedButton.disabled = false;
        }
      });

      setDefaultDatetime();
      refreshReminders();
      setInterval(refreshReminders, 1000);
    </script>
  </body>
</html>
